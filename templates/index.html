<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ROR</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{
background:#000;
color:white;
height:100vh;
overflow:hidden;
display:flex;
flex-direction:column;
}

/* BACKGROUND RED GLOW */
body::before{
content:"";
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:400px;
height:400px;
background:radial-gradient(circle,#ff000050 0%,transparent 70%);
z-index:-1;
}

/* LOGO CENTER */
.logo{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:180px;
opacity:0.15;
transition:0.3s ease;
pointer-events:none;
}

/* TOP RIGHT TOGGLE */
.toggle{
position:absolute;
top:15px;
right:15px;
display:flex;
align-items:center;
gap:10px;
background:#111;
padding:6px 12px;
border-radius:30px;
border:1px solid #222;
}

.toggle button{
background:none;
border:none;
color:#aaa;
font-size:16px;
cursor:pointer;
}

.toggle button.active{
color:#ff3b00;
}

/* CHAT AREA */
.chat{
flex:1;
overflow-y:auto;
padding:70px 15px 100px 15px;
display:flex;
flex-direction:column;
}

.message{
max-width:75%;
padding:10px 14px;
border-radius:18px;
margin-bottom:5px;
font-size:14px;
}

.user{
align-self:flex-end;
background:#1c1c1c;
}

.bot{
align-self:flex-start;
background:#2a2a2a;
}

.time{
font-size:10px;
color:#888;
margin-bottom:12px;
}

/* MIC PANEL */
.mic-panel{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
transition:0.3s ease;
}

.mic-btn{
width:65px;
height:65px;
border-radius:50%;
background:radial-gradient(circle,#ff3b00,#8b0000);
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 0 20px #ff0000;
position:relative;
cursor:pointer;
}

.mic-btn::after{
content:"";
position:absolute;
width:100%;
height:100%;
border-radius:50%;
border:2px solid #ff0000;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);opacity:0.8;}
100%{transform:scale(1.8);opacity:0;}
}

/* KEYBOARD PANEL */
.keyboard-panel{
position:absolute;
bottom:0;
left:0;
width:100%;
background:#111;
padding:10px;
display:flex;
gap:8px;
transform:translateY(100%);
transition:0.3s ease;
}

.keyboard-panel.active{
transform:translateY(0);
}

input{
flex:1;
padding:12px;
border-radius:25px;
border:none;
outline:none;
background:#222;
color:white;
}

.send{
padding:12px 18px;
border:none;
border-radius:25px;
background:#ff3b00;
color:white;
}
</style>
</head>

<body>

<img src="{{ url_for('static', filename='ror-logo.png') }}" class="logo" id="logo">

<div class="toggle">
<button id="micToggle" class="active">🎤</button>
<button id="keyToggle">⌨️</button>
</div>

<div class="chat" id="chat"></div>

<div class="mic-panel" id="micPanel">
<div class="mic-btn" id="micBtn">
<svg width="22" height="22" fill="white" viewBox="0 0 24 24">
<path d="M12 15a3 3 0 003-3V6a3 3 0 10-6 0v6a3 3 0 003 3z"/>
<path d="M19 11a7 7 0 01-14 0H3a9 9 0 0018 0h-2z"/>
</svg>
</div>
</div>

<div class="keyboard-panel" id="keyboardPanel">
<input type="text" id="input" placeholder="Type message...">
<button class="send" onclick="sendMessage()">Send</button>
</div>

<script>
const micToggle=document.getElementById("micToggle");
const keyToggle=document.getElementById("keyToggle");
const micPanel=document.getElementById("micPanel");
const keyboardPanel=document.getElementById("keyboardPanel");
const chat=document.getElementById("chat");
const logo=document.getElementById("logo");
const input=document.getElementById("input");
const micBtn=document.getElementById("micBtn");

function updateLogo(){
logo.style.display=chat.children.length===0?"block":"none";
}

function addMessage(text,type){
const msg=document.createElement("div");
msg.className="message "+type;
msg.innerText=text;
chat.appendChild(msg);

const time=document.createElement("div");
time.className="time";
time.innerText="Sent · "+new Date().toLocaleTimeString();
chat.appendChild(time);

chat.scrollTop=chat.scrollHeight;
updateLogo();
}

micToggle.onclick=()=>{
micToggle.classList.add("active");
keyToggle.classList.remove("active");
keyboardPanel.classList.remove("active");
};

keyToggle.onclick=()=>{
keyToggle.classList.add("active");
micToggle.classList.remove("active");
keyboardPanel.classList.add("active");
input.focus();
};

async function sendMessage(){
if(!input.value.trim())return;
addMessage(input.value,"user");
sendToBackend(input.value);
input.value="";
}

async function sendToBackend(text){
const res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
});
const data=await res.json();
addMessage(data.reply,"bot");

const speech=new SpeechSynthesisUtterance(data.reply);
speech.lang="en-IN";
window.speechSynthesis.speak(speech);
}

if('webkitSpeechRecognition'in window){
const recognition=new webkitSpeechRecognition();
recognition.lang="en-IN";
recognition.onresult=e=>{
const transcript=e.results[0][0].transcript;
addMessage(transcript,"user");
sendToBackend(transcript);
};
micBtn.onclick=()=>recognition.start();
}

updateLogo();
</script>

</body>
</html>
