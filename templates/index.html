<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ROR</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, sans-serif;
}

body {
  background: #000;
  height: 100vh;
  overflow: hidden;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* LOGO */
.logo {
  width: 170px;
  margin-top: 60px;
  opacity: 0.6;
  filter: drop-shadow(0 0 10px #ff0000);
}

/* VOICE MODE CONTAINER */
.voice-mode {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* MIC BUTTON */
.mic-container {
  position: relative;
  margin-top: 60px;
}

.wave {
  position: absolute;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 2px solid rgba(255,0,0,0.6);
  animation: wave 2s infinite;
}

.wave:nth-child(2) {
  animation-delay: 1s;
}

@keyframes wave {
  0% { transform: scale(0.7); opacity: 0.8; }
  100% { transform: scale(1.8); opacity: 0; }
}

.mic-button {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: radial-gradient(circle, #ff3b00 0%, #8b0000 70%);
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 0 20px #ff0000;
  z-index: 2;
  cursor: pointer;
}

/* MODE SWITCH */
.mode-switch {
  margin-bottom: 40px;
  background: #111;
  padding: 10px 20px;
  border-radius: 30px;
  display: flex;
  gap: 15px;
  border: 1px solid #222;
}

.mode-btn {
  padding: 8px 18px;
  border-radius: 20px;
  background: transparent;
  border: 1px solid #333;
  color: #aaa;
  cursor: pointer;
  transition: 0.3s ease;
}

.mode-btn.active {
  background: #ff3b00;
  color: white;
  border: none;
}

/* CHAT MODE */
.chat-mode {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 100%;
  background: #000;
  display: none;
  flex-direction: column;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  margin-bottom: 12px;
  padding: 12px 15px;
  border-radius: 18px;
  max-width: 75%;
  font-size: 14px;
}

.user {
  background: #1f1f1f;
  align-self: flex-end;
}

.bot {
  background: #2a2a2a;
  align-self: flex-start;
}

.input-area {
  display: flex;
  padding: 10px;
  background: #111;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 25px;
  border: none;
  outline: none;
  background: #222;
  color: white;
}

button.send-btn {
  margin-left: 8px;
  padding: 12px 16px;
  border-radius: 25px;
  border: none;
  background: #ff3b00;
  color: white;
}
</style>
</head>

<body>

<img src="{{ url_for('static', filename='ror-logo.png') }}" class="logo">

<div class="voice-mode" id="voiceMode">

  <div class="mic-container">
    <div class="wave"></div>
    <div class="wave"></div>

    <div class="mic-button" id="micBtn">
      <!-- SVG MIC ICON -->
      <svg width="30" height="30" fill="white" viewBox="0 0 24 24">
        <path d="M12 15a3 3 0 003-3V6a3 3 0 10-6 0v6a3 3 0 003 3z"/>
        <path d="M19 11a7 7 0 01-14 0H3a9 9 0 0018 0h-2z"/>
      </svg>
    </div>
  </div>

</div>

<div class="chat-mode" id="chatMode">
  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Type a message...">
    <button class="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<div class="mode-switch">
  <button class="mode-btn active" id="micMode">Voice</button>
  <button class="mode-btn" id="keyboardMode">Keyboard</button>
</div>

<script>
const micBtn = document.getElementById("micBtn");
const micMode = document.getElementById("micMode");
const keyboardMode = document.getElementById("keyboardMode");
const voiceMode = document.getElementById("voiceMode");
const chatMode = document.getElementById("chatMode");
const messages = document.getElementById("messages");
const input = document.getElementById("userInput");

let recognition;
if ('webkitSpeechRecognition' in window) {
  recognition = new webkitSpeechRecognition();
  recognition.lang = "en-IN";
  recognition.onresult = function(event) {
    const transcript = event.results[0][0].transcript;
    sendToBackend(transcript);
  };
}

micBtn.addEventListener("click", () => {
  if (recognition) recognition.start();
});

keyboardMode.addEventListener("click", () => {
  keyboardMode.classList.add("active");
  micMode.classList.remove("active");
  voiceMode.style.display = "none";
  chatMode.style.display = "flex";
});

micMode.addEventListener("click", () => {
  micMode.classList.add("active");
  keyboardMode.classList.remove("active");
  voiceMode.style.display = "flex";
  chatMode.style.display = "none";
});

function addMessage(text, sender) {
  const div = document.createElement("div");
  div.className = "message " + sender;
  div.innerText = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  addMessage(text, "user");
  input.value = "";
  sendToBackend(text);
}

async function sendToBackend(text) {
  const response = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message: text})
  });
  const data = await response.json();
  addMessage(data.reply, "bot");

  const speech = new SpeechSynthesisUtterance(data.reply);
  speech.lang = "en-IN";
  window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
