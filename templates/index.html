<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ROR</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: system-ui, -apple-system, sans-serif;
}

body {
  background: #000;
  color: white;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* LOGO */
.logo {
  width: 180px;
  margin-bottom: 60px;
}

/* MIC BUTTON */
.mic-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 50px;
}

.mic-button {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: radial-gradient(circle, #ff3b00 0%, #8b0000 70%);
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 0 15px #ff3b00,
              0 0 30px #ff0000;
  transition: 0.3s ease;
}

.mic-button:active {
  transform: scale(0.95);
  box-shadow: 0 0 25px #ff3b00,
              0 0 50px #ff0000;
}

.mic-icon {
  font-size: 30px;
}

/* MODE SWITCH */
.mode-switch {
  background: #111;
  padding: 10px 20px;
  border-radius: 30px;
  display: flex;
  gap: 15px;
  align-items: center;
  border: 1px solid #222;
}

.mode-btn {
  padding: 8px 18px;
  border-radius: 20px;
  background: transparent;
  border: 1px solid #333;
  color: #aaa;
  cursor: pointer;
  transition: 0.3s;
}

.mode-btn.active {
  background: #ff3b00;
  color: white;
  border: none;
}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<div class="mic-wrapper">
  <div class="mic-button" id="micBtn">
    <div class="mic-icon">🎤</div>
  </div>
</div>

<div class="mode-switch">
  <button class="mode-btn active" id="micMode">Mic Mode</button>
  <button class="mode-btn" id="keyboardMode">Keyboard Mode</button>
</div>

<script>
const micBtn = document.getElementById("micBtn");
const micMode = document.getElementById("micMode");
const keyboardMode = document.getElementById("keyboardMode");

micBtn.addEventListener("click", () => {
  alert("Mic Activated"); // Later we connect real voice logic
});

micMode.addEventListener("click", () => {
  micMode.classList.add("active");
  keyboardMode.classList.remove("active");
});

keyboardMode.addEventListener("click", () => {
  keyboardMode.classList.add("active");
  micMode.classList.remove("active");
});
</script>

</body>
</html>
