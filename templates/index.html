<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ROR</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
background:#000;
color:#fff;
height:100vh;
overflow:hidden;
position:relative;
}

/* RED AMBIENT GLOW */
body::before{
content:"";
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:600px;
height:600px;
background:radial-gradient(circle,#ff2a0025 0%,transparent 70%);
z-index:-2;
}

/* LOGO */
.logo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:180px;
opacity:1;
transition:.4s ease;
z-index:-1;
}

/* CHAT */
.chat{
position:absolute;
top:0;
left:0;
right:0;
bottom:140px;
overflow-y:auto;
padding:20px 15px 0 15px;
display:flex;
flex-direction:column;
}

/* BUBBLES */
.bubble{
max-width:75%;
padding:12px 15px;
border-radius:18px;
margin-bottom:4px;
font-size:14px;
}

.user{align-self:flex-end;background:#1c1c1c;}
.bot{align-self:flex-start;background:#2a2a2a;}

.meta{
font-size:10px;
color:#888;
margin-bottom:12px;
}

.user-meta{text-align:right;align-self:flex-end;}
.bot-meta{text-align:left;align-self:flex-start;}

/* MIC PANEL */
.mic-panel{
position:fixed;
bottom:90px;
left:50%;
transform:translateX(-50%);
display:flex;
justify-content:center;
align-items:center;
}

/* BLOB */
.blob{
position:absolute;
width:160px;
height:160px;
z-index:1;
transition:.3s ease;
}

.mic{
width:70px;
height:70px;
border-radius:50%;
background:radial-gradient(circle,#ff3b00,#8b0000);
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 0 18px #ff0000;
cursor:pointer;
z-index:2;
transition:.3s ease;
}

/* KEYBOARD */
.keyboard{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
padding:10px;
display:none;
gap:8px;
}

input{
flex:1;
padding:12px;
border-radius:25px;
border:none;
outline:none;
background:#222;
color:#fff;
}

.send{
padding:12px 18px;
border:none;
border-radius:25px;
background:#ff3b00;
color:#fff;
cursor:pointer;
}

/* TOGGLE TAB */
.toggle-tab{
position:fixed;
top:20px;
right:0;
width:10px;
height:45px;
background:#ff3b00;
border-radius:6px 0 0 6px;
z-index:500;
cursor:pointer;
}

/* TOGGLE DRAWER */
.toggle-drawer{
position:fixed;
top:20px;
right:-120px;
width:120px;
height:45px;
background:#111;
border-radius:25px 0 0 25px;
display:flex;
align-items:center;
justify-content:space-around;
transition:.3s ease;
z-index:499;
}

.toggle-drawer.open{
right:0;
}

.toggle-drawer button{
background:none;
border:none;
color:white;
font-size:18px;
cursor:pointer;
}
</style>
</head>

<body>

<img src="{{ url_for('static', filename='ror-logo.png') }}" class="logo" id="logo">

<div class="toggle-tab" id="toggleTab"></div>

<div class="toggle-drawer" id="toggleDrawer">
<button onclick="setMicMode()">🎤</button>
<button onclick="setKeyboardMode()">⌨️</button>
</div>

<div class="chat" id="chat"></div>

<div class="mic-panel" id="micPanel">
<canvas class="blob" id="blobCanvas"></canvas>

<div class="mic" id="micBtn">
<svg width="22" height="22" fill="white" viewBox="0 0 24 24">
<path d="M12 15a3 3 0 003-3V6a3 3 0 10-6 0v6a3 3 0 003 3z"/>
<path d="M19 11a7 7 0 01-14 0H3a9 9 0 0018 0h-2z"/>
</svg>
</div>
</div>

<div class="keyboard" id="keyboard">
<input type="text" id="input">
<button class="send" onclick="sendMessage()">Send</button>
</div>

<script>
const chat=document.getElementById("chat");
const logo=document.getElementById("logo");
const micBtn=document.getElementById("micBtn");
const input=document.getElementById("input");
const canvas=document.getElementById("blobCanvas");
const ctx=canvas.getContext("2d");
const toggleTab=document.getElementById("toggleTab");
const toggleDrawer=document.getElementById("toggleDrawer");
const micPanel=document.getElementById("micPanel");
const keyboard=document.getElementById("keyboard");

canvas.width=160;
canvas.height=160;

let listening=false;
let t=0;

/* TOGGLE */
toggleTab.onclick=()=>toggleDrawer.classList.toggle("open");

function setMicMode(){
micPanel.style.display="flex";
keyboard.style.display="none";
toggleDrawer.classList.remove("open");
}

function setKeyboardMode(){
micPanel.style.display="none";
keyboard.style.display="flex";
toggleDrawer.classList.remove("open");
}

/* MESSAGES */
function addMessage(text,type){
const bubble=document.createElement("div");
bubble.className="bubble "+type;
bubble.innerText=text;
chat.appendChild(bubble);

const meta=document.createElement("div");
meta.className="meta "+(type==="user"?"user-meta":"bot-meta");
meta.innerText="Sent · "+new Date().toLocaleTimeString();
chat.appendChild(meta);

chat.scrollTop=chat.scrollHeight;
logo.style.opacity=0;
}

async function sendMessage(){
if(!input.value.trim())return;
addMessage(input.value,"user");
sendToBackend(input.value);
input.value="";
}

async function sendToBackend(text){
const res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
});
const data=await res.json();
addMessage(data.reply,"bot");
}

/* REMINDER CHECKER */
setInterval(async ()=>{
const res = await fetch("/check-reminder");
const data = await res.json();
if(data.reminder){
addMessage("🔔 Reminder: " + data.reminder, "bot");
alert("Reminder: " + data.reminder);
}
},15000);

/* BLOB */
function drawBlob(){
ctx.clearRect(0,0,160,160);
ctx.fillStyle="rgba(255,60,0,0.5)";
ctx.beginPath();
for(let i=0;i<360;i++){
let angle=i*Math.PI/180;
let base=listening?65:58;
let radius=base+4*Math.sin(angle*2+t)+3*Math.sin(angle*3+t);
let x=80+radius*Math.cos(angle);
let y=80+radius*Math.sin(angle);
if(i===0)ctx.moveTo(x,y);
else ctx.lineTo(x,y);
}
ctx.closePath();
ctx.fill();
t+=0.01;
requestAnimationFrame(drawBlob);
}
drawBlob();

/* MIC */
micBtn.onclick=()=>{
if(!('webkitSpeechRecognition' in window)) return;

const recognition=new webkitSpeechRecognition();
recognition.lang="en-IN";
recognition.continuous=false;
recognition.interimResults=false;

recognition.start();
listening=true;

recognition.onresult=e=>{
let transcript=e.results[0][0].transcript;
addMessage(transcript,"user");
sendToBackend(transcript);
};

recognition.onend=()=>{listening=false;};
recognition.onerror=()=>{listening=false;};
};
</script>

</body>
</html>
