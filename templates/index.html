<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ROR</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{
background:#000;
color:#fff;
height:100vh;
overflow:hidden;
display:flex;
flex-direction:column;
position:relative;
}

/* RED BACK GLOW */
body::before{
content:"";
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:500px;
height:500px;
background:radial-gradient(circle,#ff2a0040 0%,transparent 70%);
z-index:-2;
}

/* LOGO */
.logo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:180px;
opacity:1;
transition:.4s ease;
z-index:-1;
}

/* DRAWER TAB (always visible small edge) */
.drawer-tab{
position:fixed;
top:20px;
right:0;
width:15px;
height:50px;
background:#ff3b00;
border-radius:8px 0 0 8px;
z-index:200;
}

/* DRAWER */
.drawer{
position:fixed;
top:20px;
right:-120px;
width:120px;
height:50px;
background:#111;
border-radius:25px 0 0 25px;
display:flex;
align-items:center;
justify-content:space-around;
transition:.3s ease;
z-index:199;
}

.drawer.open{ right:0; }

.drawer button{
background:none;
border:none;
color:white;
font-size:18px;
cursor:pointer;
}

/* CHAT */
.chat{
flex:1;
overflow-y:auto;
padding:70px 15px 120px 15px;
display:flex;
flex-direction:column;
}

.bubble{
max-width:75%;
padding:12px 15px;
border-radius:18px;
margin-bottom:3px;
font-size:14px;
}

.user{ align-self:flex-end;background:#1c1c1c;}
.bot{ align-self:flex-start;background:#2a2a2a;}

.meta{
font-size:10px;
color:#888;
margin-bottom:12px;
}

.user-meta{align-self:flex-end;text-align:right;}
.bot-meta{align-self:flex-start;text-align:left;}

/* MIC AREA */
.mic-panel{
position:fixed;
bottom:90px;
left:50%;
transform:translateX(-50%);
display:flex;
justify-content:center;
align-items:center;
}

/* BLOB WAVE */
.blob{
position:absolute;
width:160px;
height:160px;
display:none;
z-index:1;
}

.mic{
width:75px;
height:75px;
border-radius:50%;
background:radial-gradient(circle,#ff3b00,#8b0000);
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 0 25px #ff0000;
cursor:pointer;
z-index:2;
}

/* KEYBOARD */
.keyboard{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
padding:10px;
display:flex;
gap:8px;
transform:translateY(100%);
transition:.3s ease;
}

.keyboard.active{ transform:translateY(0); }

input{
flex:1;
padding:12px;
border-radius:25px;
border:none;
outline:none;
background:#222;
color:#fff;
}

.send{
padding:12px 18px;
border:none;
border-radius:25px;
background:#ff3b00;
color:#fff;
}
</style>
</head>

<body>

<img src="{{ url_for('static', filename='ror-logo.png') }}" class="logo" id="logo">

<div class="drawer-tab" id="drawerTab"></div>

<div class="drawer" id="drawer">
<button onclick="setMic()">🎤</button>
<button onclick="setKeyboard()">⌨️</button>
</div>

<div class="chat" id="chat"></div>

<div class="mic-panel" id="micPanel">

<canvas class="blob" id="blobCanvas"></canvas>

<div class="mic" id="micBtn">
<svg width="22" height="22" fill="white" viewBox="0 0 24 24">
<path d="M12 15a3 3 0 003-3V6a3 3 0 10-6 0v6a3 3 0 003 3z"/>
<path d="M19 11a7 7 0 01-14 0H3a9 9 0 0018 0h-2z"/>
</svg>
</div>

</div>

<div class="keyboard" id="keyboard">
<input type="text" id="input">
<button class="send" onclick="sendMessage()">Send</button>
</div>

<script>
const drawer=document.getElementById("drawer");
const drawerTab=document.getElementById("drawerTab");
const keyboard=document.getElementById("keyboard");
const micPanel=document.getElementById("micPanel");
const chat=document.getElementById("chat");
const logo=document.getElementById("logo");
const micBtn=document.getElementById("micBtn");
const input=document.getElementById("input");
const canvas=document.getElementById("blobCanvas");
const ctx=canvas.getContext("2d");

let listening=false;

/* Drawer */
drawerTab.onclick=()=> drawer.classList.toggle("open");

/* Modes */
function setMic(){
keyboard.classList.remove("active");
micPanel.style.display="flex";
drawer.classList.remove("open");
}

function setKeyboard(){
keyboard.classList.add("active");
micPanel.style.display="none";
drawer.classList.remove("open");
}

/* Messages */
function addMessage(text,type){
const bubble=document.createElement("div");
bubble.className="bubble "+type;
bubble.innerText=text;
chat.appendChild(bubble);

const meta=document.createElement("div");
meta.className="meta "+(type==="user"?"user-meta":"bot-meta");
meta.innerText="Sent · "+new Date().toLocaleTimeString();
chat.appendChild(meta);

chat.scrollTop=chat.scrollHeight;
logo.style.opacity=0;
}

async function sendMessage(){
if(!input.value.trim())return;
addMessage(input.value,"user");
input.value="";
}

/* Proper Mic */
if('webkitSpeechRecognition'in window){
const recognition=new webkitSpeechRecognition();
recognition.lang="en-IN";
recognition.continuous=false;
recognition.interimResults=false;

micBtn.onclick=()=>{
if(listening){recognition.stop();return;}
recognition.start();
startBlob();
listening=true;
};

recognition.onresult=e=>{
let transcript=e.results[0][0].transcript;
addMessage(transcript,"user");
stopBlob();
listening=false;
};

recognition.onerror=()=>{
stopBlob();
listening=false;
};
}

/* Liquid Blob Animation */
function startBlob(){
canvas.style.display="block";
canvas.width=160;
canvas.height=160;
let t=0;

function draw(){
ctx.clearRect(0,0,160,160);
ctx.fillStyle="rgba(255,60,0,0.6)";
ctx.beginPath();
for(let i=0;i<360;i++){
let angle=i*Math.PI/180;
let radius=60+10*Math.sin(angle*4+t);
let x=80+radius*Math.cos(angle);
let y=80+radius*Math.sin(angle);
if(i===0)ctx.moveTo(x,y);
else ctx.lineTo(x,y);
}
ctx.closePath();
ctx.fill();
t+=0.05;
if(listening)requestAnimationFrame(draw);
}
draw();
}

function stopBlob(){
canvas.style.display="none";
ctx.clearRect(0,0,160,160);
}
</script>

</body>
</html>
