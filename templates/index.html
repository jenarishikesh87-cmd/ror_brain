<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ROR</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{
background:#000;
color:#fff;
height:100vh;
overflow:hidden;
display:flex;
flex-direction:column;
position:relative;
}

/* RED GLOW BACKGROUND */
body::before{
content:"";
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:500px;
height:500px;
background:radial-gradient(circle,#ff2a0030 0%,transparent 70%);
z-index:-2;
}

/* LOGO */
.logo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:180px;
opacity:1;
transition:opacity .4s ease;
z-index:-1;
}

/* SLIDE TOGGLE DRAWER */
.drawer{
position:fixed;
top:15px;
right:-80px;
width:80px;
height:40px;
background:#111;
border-radius:25px 0 0 25px;
display:flex;
align-items:center;
justify-content:space-around;
padding:5px;
transition:.3s ease;
z-index:100;
}

.drawer.open{ right:0; }

.drawer span{
cursor:pointer;
font-size:18px;
}

/* CHAT */
.chat{
flex:1;
overflow-y:auto;
padding:70px 15px 120px 15px;
display:flex;
flex-direction:column;
}

.bubble{
max-width:75%;
padding:12px 15px;
border-radius:18px;
margin-bottom:2px;
font-size:14px;
}

.user{
align-self:flex-end;
background:#1c1c1c;
}

.bot{
align-self:flex-start;
background:#2a2a2a;
}

.meta{
font-size:10px;
color:#888;
margin-bottom:12px;
}

.user-meta{
align-self:flex-end;
text-align:right;
}

.bot-meta{
align-self:flex-start;
text-align:left;
}

/* MIC PANEL */
.mic-panel{
position:fixed;
bottom:70px;
left:50%;
transform:translateX(-50%);
display:flex;
justify-content:center;
align-items:center;
z-index:10;
}

/* LIQUID SVG RING */
.energy{
position:absolute;
width:160px;
height:160px;
display:none;
animation:spin 8s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.energy path{
fill:none;
stroke:url(#grad);
stroke-width:8;
stroke-linecap:round;
filter:drop-shadow(0 0 12px #ff3b00);
animation:morph 4s ease-in-out infinite alternate;
}

@keyframes morph{
0%{stroke-width:6;}
50%{stroke-width:12;}
100%{stroke-width:6;}
}

.mic{
width:70px;
height:70px;
border-radius:50%;
background:radial-gradient(circle,#ff3b00,#8b0000);
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 0 25px #ff0000;
cursor:pointer;
position:relative;
z-index:5;
}

/* KEYBOARD */
.keyboard{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
padding:10px;
display:flex;
gap:8px;
transform:translateY(100%);
transition:.3s ease;
}

.keyboard.active{ transform:translateY(0); }

input{
flex:1;
padding:12px;
border-radius:25px;
border:none;
outline:none;
background:#222;
color:#fff;
}

.send{
padding:12px 18px;
border:none;
border-radius:25px;
background:#ff3b00;
color:#fff;
}
</style>
</head>

<body>

<img src="{{ url_for('static', filename='ror-logo.png') }}" class="logo" id="logo">

<div class="drawer" id="drawer">
<span id="micMode">🎤</span>
<span id="keyMode">⌨️</span>
</div>

<div class="chat" id="chat"></div>

<div class="mic-panel" id="micPanel">

<svg class="energy" id="energy" viewBox="0 0 200 200">
<defs>
<linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#ff3b00"/>
<stop offset="100%" stop-color="#ff9900"/>
</linearGradient>
</defs>
<path d="M100 20
C160 20,180 80,150 120
C120 160,80 180,50 140
C20 100,40 40,100 20Z"/>
</svg>

<div class="mic" id="micBtn">
<svg width="22" height="22" fill="white" viewBox="0 0 24 24">
<path d="M12 15a3 3 0 003-3V6a3 3 0 10-6 0v6a3 3 0 003 3z"/>
<path d="M19 11a7 7 0 01-14 0H3a9 9 0 0018 0h-2z"/>
</svg>
</div>

</div>

<div class="keyboard" id="keyboard">
<input type="text" id="input" placeholder="Type message...">
<button class="send" onclick="sendMessage()">Send</button>
</div>

<script>
const drawer=document.getElementById("drawer");
const micMode=document.getElementById("micMode");
const keyMode=document.getElementById("keyMode");
const micPanel=document.getElementById("micPanel");
const keyboard=document.getElementById("keyboard");
const chat=document.getElementById("chat");
const logo=document.getElementById("logo");
const input=document.getElementById("input");
const energy=document.getElementById("energy");
const micBtn=document.getElementById("micBtn");

let micActive=true;

/* DRAWER OPEN ON EDGE TAP */
document.body.addEventListener("click",(e)=>{
if(e.clientX>window.innerWidth-20){
drawer.classList.add("open");
}else if(!drawer.contains(e.target)){
drawer.classList.remove("open");
}
});

micMode.onclick=()=>{
micActive=true;
micPanel.style.display="flex";
keyboard.classList.remove("active");
drawer.classList.remove("open");
};

keyMode.onclick=()=>{
micActive=false;
micPanel.style.display="none";
keyboard.classList.add("active");
drawer.classList.remove("open");
input.focus();
};

function addMessage(text,type){
const bubble=document.createElement("div");
bubble.className="bubble "+type;
bubble.innerText=text;
chat.appendChild(bubble);

const meta=document.createElement("div");
meta.className="meta "+(type==="user"?"user-meta":"bot-meta");
meta.innerText="Sent · "+new Date().toLocaleTimeString();
chat.appendChild(meta);

chat.scrollTop=chat.scrollHeight;
logo.style.opacity=0;
}

async function sendMessage(){
if(!input.value.trim())return;
addMessage(input.value,"user");
sendToBackend(input.value);
input.value="";
}

async function sendToBackend(text){
const res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
});
const data=await res.json();
addMessage(data.reply,"bot");
}

if('webkitSpeechRecognition'in window){
const recognition=new webkitSpeechRecognition();
recognition.lang="en-IN";
recognition.continuous=true;
recognition.interimResults=true;

micBtn.onclick=()=>{
energy.style.display="block";
recognition.start();
};

recognition.onresult=e=>{
let last=e.results[e.results.length-1];
if(last.isFinal){
energy.style.display="none";
let transcript=last[0].transcript;
addMessage(transcript,"user");
sendToBackend(transcript);
recognition.stop();
}
};

recognition.onerror=()=>{
energy.style.display="none";
recognition.stop();
};
}
</script>

</body>
</html>
